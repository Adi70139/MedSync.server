version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: prescripto-pg
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - prescripto_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: prescripto-redis
    ports:
      - "6379:6379"

#  ollama:
#    image: ollama/ollama:latest
#    container_name: prescripto-ollama
#    ports:
#      - "11434:11434"
#    volumes:
#      - ollama_data:/root/.ollama
#    restart: unless-stopped

  app:
    build: .
    container_name: prescripto-app
    depends_on:
      pgvector:
        condition: service_started
      redis:
        condition: service_started
#      ollama:
#        condition: service_started

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgvector:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
#      SPRING_AI_VECTORSTORE_PGVECTOR_ENABLED: 'true'
#      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - ./uploads:/app/uploads
    command: sh -c "java -Xms256m -Xmx512m -jar /app/app.jar"

    env_file:
      - .env

volumes:
  prescripto_pgdata:
#  ollama_data:
